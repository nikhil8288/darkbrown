      clipboard:'M9 2h6a1 1 0 0 1 1 1v1h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2V3a1 1 0 0 1 1-1z',

      file:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6',

    };
    const tint = {
      blue:['#2E7D6A','rgba(46,107,87,.20)'], green:['#1E7E58','rgba(46,107,87,.22)'],
      purple:['#9A7A2E','rgba(201,168,106,.16)'], orange:['#9A7A2E','rgba(201,168,106,.18)'],
      teal:['#1E7E58','rgba(46,107,87,.20)'], red:['#BC512B','rgba(224,138,102,.18)']
    };

    // ---------- responsive container styles ----------
    const rootStyle = S.forceMobile
      ? 'display:flex;align-items:flex-start;justify-content:center;height:100vh;width:100%;background:#E7DCCB;padding:26px;overflow:auto'
      : 'height:100vh;width:100%';
    const appBase = 'background:#F4EDE6;color:#3E2723;position:relative;font-size:13px;';
    const appStyle = isMobile
      ? appBase + 'display:flex;flex-direction:column;overflow:hidden;' + (S.forceMobile
          ? 'width:392px;height:812px;border-radius:30px;border:1px solid #D9C9B5;box-shadow:0 28px 80px rgba(62,39,35,.22);flex-shrink:0'
          : 'width:100%;height:100vh')
      : appBase + 'display:flex;flex-direction:row;width:100%;height:100vh;overflow:clip';
    const sidebarBase = 'background:#FFFFFF;border-right:1px solid #EAE0D2;display:flex;flex-direction:column;flex-shrink:0;';

      onDismiss:(e)=>{ e.stopPropagation(); setState(st => ({ dismissed: st.dismissed.concat(a[0]) })); }
    }));

    // ---------- health cards ----------
    const same = (o) => ({ today:o, month:o, quarter:o, year:o });
    const cardDefs = [
      // 1 Net Margin = (Income - Head-lease) / Income
      { icon:'trendUp', t:'teal', label:'Net Margin', drill:'finance', dl:'Finance', tf:{
        today:{v:'QAR 46K',s:'28.4% margin · income − head-lease',d:'+5.1%',up:1,good:1},
        month:{v:'QAR 1.36M',s:'28.2% margin · income − head-lease',d:'+9.4%',up:1,good:1},
        quarter:{v:'QAR 4.02M',s:'28.1% margin · income − head-lease',d:'+7.8%',up:1,good:1},
        year:{v:'QAR 15.9M',s:'28.0% margin · income − head-lease',d:'+14.2%',up:1,good:1} } },
      // 2 Rental Income
      { icon:'dollar', t:'green', label:'Rental Income', drill:'finance', dl:'Finance', tf:{
        today:{v:'QAR 162K',s:'billed to tenants today',d:'+3.2%',up:1,good:1},
        month:{v:'QAR 4.82M',s:'billed this month',d:'+6.2%',up:1,good:1},
        quarter:{v:'QAR 14.31M',s:'billed this quarter',d:'+5.4%',up:1,good:1},
        year:{v:'QAR 56.8M',s:'billed FY to date',d:'+12.6%',up:1,good:1} } },
      // 3 Head-lease Cost
      { icon:'building', t:'purple', label:'Head-lease Cost', drill:'finance', dl:'Finance', tf:{
        today:{v:'QAR 116K',s:'owed to landlords today',d:'+2.8%',up:1,good:0},
        month:{v:'QAR 3.46M',s:'owed to landlords',d:'+4.1%',up:1,good:0},
        quarter:{v:'QAR 10.29M',s:'owed to landlords',d:'+3.9%',up:1,good:0},
        year:{v:'QAR 40.9M',s:'owed to landlords',d:'+11.0%',up:1,good:0} } },
      // 4 Collected vs Billed
      { icon:'check', t:'blue', label:'Collected vs Billed', drill:'finance', dl:'Finance', tf:{

        quarter:{v:'83%',s:'QAR 11.9M of 14.31M',d:'+1.4 pts',up:1,good:1},
        year:{v:'86%',s:'QAR 48.9M of 56.8M',d:'+3.1 pts',up:1,good:1} } },

      { icon:'clock', t:'teal', label:'Forward PDC Cash', drill:'finance', dl:'Finance', fixed:1,

      { icon:'percent', t:'purple', label:'Occupancy', drill:'portfolio', dl:'Portfolio',
        tf: same({v:'88.6%',s:'567 of 640 units let',d:'+1.8 pts',up:1,good:1}) },
      // 7 Vacant Units + QAR bleed
      { icon:'home', t:'orange', label:'Vacant Units', drill:'portfolio', dl:'Portfolio', tf:{
        today:{v:'73',s:'QAR 31K bleed today · head-lease on empty',d:'-11',up:0,good:1},

        quarter:{v:'73',s:'QAR 2.7M bleed this quarter',d:'-11',up:0,good:1},
        year:{v:'73',s:'QAR 10.4M bleed this year',d:'-11',up:0,good:1} } },

      { icon:'calendar', t:'red', label:'Expiring Contracts', drill:'tenants', dl:'Leasing', fixed:1,
        value:'38 at risk', sub:'1 landlord bldg = 30 tenancies · 5 subleases · ≤90d', chip:'≤90d', chipTone:'warn' },

      { icon:'tag', t:'green', label:'Deal Pipeline', drill:'finance', dl:'Finance', tf:{
        today:{v:'2 signed',s:'QAR 18K commission today',d:'+2',up:1,good:1},
        month:{v:'14 signed',s:'QAR 0.42M commission earned',d:'+5',up:1,good:1},
        quarter:{v:'38 signed',s:'QAR 1.18M commission earned',d:'+8',up:1,good:1},

    ];
    const cardGridStyle = isMobile
      ? 'display:grid;grid-template-columns:1fr 1fr;gap:10px'
      : 'display:grid;grid-template-columns:repeat(3,1fr);gap:14px';
    const neutralChip = 'display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#6B5648;background:#EAE0D2;padding:2px 8px;border-radius:6px';
    const warnChip = 'display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#9A7A2E;background:rgba(201,168,106,.18);padding:2px 8px;border-radius:6px';
    const cards = cardDefs.map((c,i) => {
      const cardStyle = 'background:#FFFFFF;border:1px solid #EAE0D2;border-radius:11px;padding:16px;cursor:pointer;transition:border-color .15s,transform .15s;' +
        (isMobile && i===0 ? 'grid-column:1 / -1;' : '');
      if (c.fixed) {
        return { iconPath:ic[c.icon], tint:tint[c.t][0], tintBg:tint[c.t][1], label:c.label, drillLabel:c.dl,

          delta:c.chip, showArrow:false, deltaArrow:'', cardStyle, onClick:()=>drillTo(c.drill),
          deltaStyle: c.chipTone==='warn' ? warnChip : neutralChip };
      }
      const d = c.tf[S.tf] || c.tf.month;
      if (d.nd) {
        return { iconPath:ic[c.icon], tint:tint[c.t][0], tintBg:tint[c.t][1], label:c.label, drillLabel:c.dl,
          value:'—', valueStyle:'font-size:20px;font-weight:600;color:#857260;line-height:1', sub:d.s,
          delta:'no data', showArrow:false, deltaArrow:'', cardStyle, onClick:()=>drillTo(c.drill),
          deltaStyle:'display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#857260;background:#EAE0D2;padding:2px 8px;border-radius:6px' };
      }
      const gc = d.good ? tint.green : tint.red;
      return { iconPath:ic[c.icon], tint:tint[c.t][0], tintBg:tint[c.t][1], label:c.label, drillLabel:c.dl,
        value:d.v, valueStyle:'font-size:24px;font-weight:700;letter-spacing:-.4px;line-height:1', sub:d.s,

     .sort((a,b)=> b.m - a.m)
     .map(b => {
       const col = b.m>=25 ? tint.green[0] : (b.m>=10 ? tint.orange[0] : tint.red[0]);
       const bg  = b.m>=25 ? tint.green[1] : (b.m>=10 ? tint.orange[1] : tint.red[1]);
       return { name:b.name, marginPct:(b.m>=0?'+':'') + b.m.toFixed(1) + '%',
         spread:'QAR ' + b.inc.toFixed(2) + 'M income · ' + b.hl.toFixed(2) + 'M lease',
         barW: Math.max(4, Math.min(100, b.m)) + '%', col,
         pillStyle:'flex-shrink:0;font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:7px;color:'+col+';background:'+bg };
     });

    // ---------- overview chart ----------
    const chartEmpty = (S.tf === 'today');
    const chartSub = chartEmpty ? 'Awaiting today\u2019s billing run' :
      (S.tf === 'year' ? 'QAR M per month · FY to date' : 'QAR M per month · last 6 months');

      maintenance: { maintKpis:12, maintList:8, maintByBldg:4 },
    };
    const poolActive = S.tab === 'maintenance';
    const sp = spanDefs[S.tab] || {};
    const show = (k) => poolActive && (k in sp);
    const poolKeys = ['salesTrend','collected','approvals','bookings','projects','funnel','receivables','expiries','maintKpis','maintList','maintByBldg'];
    const spanStyle = {};
    poolKeys.forEach(k => { spanStyle[k] = 'grid-column:span ' + (isMobile ? 12 : (sp[k] || 12)) + ';'; });
    const poolGridStyle = 'display:grid;grid-template-columns:repeat(12,1fr);gap:' + (isMobile ? '12px' : '16px') + ';align-items:start';

    // ---------- pool data ----------
    const approvals = [
      ['Lease Agreement','LA-2026-00142','Sublease · West Bay Plaza · Unit 1410','QAR 18.5K/mo','2h ago','green','tag'],
      ['Landlord Payment','PE-2026-00871','Head-lease rent · Al Sadd Tower','QAR 412K','4h ago','teal','dollar'],
      ['Rent Discount','SO-2026-01093','12% on Unit B-908 · above policy','QAR 26K','5h ago','red','invoice'],
      ['Deposit Refund','JV-2026-00455','Tenant exit · Pearl Residency B-22','QAR 45K','1d ago','purple','dollar'],
      ['Maintenance PO','PO-2026-00231','AC overhaul · Lusail Office Block','QAR 78K','1d ago','orange','cart'],
    ].map(a => ({ type:a[0], ref:a[1], detail:a[2], amount:a[3], age:a[4], tintCol:tint[a[5]][0], tintBg:tint[a[5]][1], iconPath:ic[a[6]] }));

    const bookingHeadStyle = 'display:grid;grid-template-columns:1.6fr 1fr auto auto;gap:14px;padding:0 4px 9px;font-size:10.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:#857260;border-bottom:1px solid #EAE0D2';
    const bookingRowStyle = 'display:grid;grid-template-columns:1.6fr 1fr auto auto;gap:14px;align-items:center;padding:11px 4px;border-bottom:1px solid #EAE0D2;cursor:pointer;transition:background .12s';
    const bookings = [
      ['Qatar Petroleum Svcs','West Bay Plaza · U-1410','QAR 18.5K/mo','Signed','green','KA'],

            <!-- MAINTENANCE REQUESTS -->
            ${(showMaintList)?`
            <div style="${spanStyle.maintList}">
              <div style="background:#FFFFFF;border:1px solid #EAE0D2;border-radius:12px;padding:18px 18px 8px">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:.2px">Open Maintenance Requests</div><a href="#" style="font-size:11.5px;color:#2E7D6A;text-decoration:none;font-weight:550">Open Maintenance</a></div>
                <div style="display:flex;flex-direction:column">
                  <div style="${maintHeadStyle}"><span>Location / Issue</span><span style="text-align:center">Priority</span><span style="text-align:center">Status</span><span style="text-align:right">Age</span></div>
                  ${(maintRequests).map((r)=>`
                    <div style="${maintRowStyle}">
                      <div style="min-width:0"><div style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.loc}</div><div style="font-size:11px;color:#9A8775;margin-top:1px">${r.issue}</div></div>
                      <span style="justify-self:center;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;color:${r.priCol};background:${r.priBg}">${r.priority}</span>
                      <span style="justify-self:center;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;color:${r.statusCol};background:${r.statusBg}">${r.status}</span>
                      <span style="text-align:right;font-size:11px;color:#9A8775">${r.age}</span>
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
            `:""}

            <!-- MAINTENANCE BY BUILDING -->
            ${(showMaintByBldg)?`
            <div style="${spanStyle.maintByBldg}">
              <div style="background:#FFFFFF;border:1px solid #EAE0D2;border-radius:12px;padding:18px">
                <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:.2px">Requests by Building</div>
                <div style="font-size:11.5px;color:#8C7A68;margin-top:2px;margin-bottom:18px">Open tickets</div>
                <div style="display:flex;flex-direction:column;gap:13px">
                  ${(maintByBldg).map((m)=>`
                    <div>
                      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#4E342E;font-weight:500">${m.name}</span><span style="font-weight:650">${m.count}</span></div>
                      <div style="height:8px;background:#F0E7DA;border-radius:5px;overflow:hidden"><div style="height:100%;width:${m.w};background:${m.col};border-radius:5px;transition:width .6s ease"></div></div>
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
            `:""}

          </div>
          `:""}

        </div>
      </main>
    </div>
  </div>
</div>
</x-dc>
`;
}
var root = document.getElementById('mdd-root');
function render(){
  var main = root.querySelector('main');
  var st = main ? main.scrollTop : 0;
  H = [];
  root.innerHTML = tpl(renderVals());
  var m2 = root.querySelector('main');
  if (m2) m2.scrollTop = st;
}
root.addEventListener('click', function(e){
  var el = e.target.closest('[data-h]');
  if (!el || el.dataset.h === '') return;
  var fn = H[+el.dataset.h];
  if (fn) fn(e);
});
window.addEventListener('resize', function(){ setState({ vw: window.innerWidth }); });
state.vw = window.innerWidth;
render();
/* ---- live-data hook (Phase 2) ----
   Each whitelisted endpoint returns {"live": false} until wired to DocTypes.
   When live, fetch here and merge into the data constants inside renderVals:
   fetch('/api/method/darkbrown.api.md_dashboard.get_overview', {headers:{'X-Frappe-CSRF-Token': frappe && frappe.csrf_token || ''}})
*/
})();
</script>
